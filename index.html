<html>

<head>

    <style>
        body>.container {
            box-sizing: border-box;
            padding: 3rem 4rem;
        }

        body>* {
            box-sizing: border-box;
        }

        .camera-wrapper {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 3rem;
        }

        @media (max-width: 1100px) {
            body>.container {
                padding: 16px;
            }

            .camera-wrapper {
                flex-direction: column;
            }

            #camera-preview,
            #camera-canvas {
                max-width: calc(100% - 16px);
            }
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css" rel="stylesheet">
</head>

<body>
    <div class="container"
        style="height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: white; margin: 0;">
        <button id="btn-request-permission"
            style="display: none; cursor: pointer; padding: 1.5rem 3rem; background-color: black; border: 0; color: white; border-radius: 8px; font-size: 1rem; text-transform: uppercase;">request
            location permission</button>
        <button id="btn-open-camera"
            style="display: none; cursor: pointer; padding: 1.5rem 3rem; background-color: black; border: 0; color: white; border-radius: 8px; font-size: 1rem; text-transform: uppercase;">open
            camera</button>
        <div id="camera-opened"
            style="display: none; align-items: center; justify-content: center; flex-direction: column;">
            <div class="camera-wrapper">
                <video id="camera-preview">Video stream not
                    available.</video>
                <div style="position: relative;">
                    <canvas id="camera-canvas" style="opacity: 0;"></canvas>
                    <img id="camera-result" style="position: absolute; left: 0; top: 0; height: 100%; width: 100%;" />
                </div>
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 1rem; flex-flow: row wrap;">
                <button id="btn-take-photo"
                    style="cursor: pointer; padding: 1.5rem 3rem; border: 0; background-color: black; color: white; border-radius: 8px; font-size: 1rem; text-transform: uppercase;">take
                    photo</button>
                <button id="btn-download-photo"
                    style="cursor: pointer; padding: 1.5rem 3rem; border: 0; background-color: lightgray; color: black; border-radius: 8px; font-size: 1rem; text-transform: uppercase;">download
                    photo</button>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
<script lang="js">
    const isMobile = window.innerWidth <= 600;
    const width = isMobile ? window.innerWidth - 48 : 480;
    let height = 0;
    let streaming = false;
    let localStream = null;
    let localImage = null;
    let localLocation = null;

    let isLocationAllowed = false;

    const cameraPreview = document.getElementById('camera-preview');
    const cameraCanvas = document.getElementById('camera-canvas');
    const cameraResult = document.getElementById('camera-result');
    const btnRequestPermission = document.getElementById('btn-request-permission');
    const btnTakePhoto = document.getElementById('btn-take-photo');
    const btnDownloadPhoto = document.getElementById('btn-download-photo');
    const cameraOpened = document.getElementById('camera-opened');
    const btnOpenCamera = document.getElementById('btn-open-camera');

    const getLocationName = async (lat, lon) => {
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&accept-language=id`;

        try {
            const response = await fetch(url);
            const data = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data, "text/xml");

            const addrParts = xmlDoc.getElementsByTagName("addressparts")[0];

            const road = addrParts.getElementsByTagName('road')[0]?.textContent ?? '';
            const village = addrParts.getElementsByTagName('village')[0]?.textContent ?? '';
            const city = addrParts.getElementsByTagName('city')[0]?.textContent ?? '';
            const state = addrParts.getElementsByTagName('state')[0]?.textContent ?? '';
            const postcode = addrParts.getElementsByTagName('postcode')[0]?.textContent ?? '';

            return `${road}, ${village}, ${city}, ${state} ${postcode}`;
        } catch (error) {
            console.error("Error fetching location:", error);
        }
    }

    const getCurrentPosition = () => {
        return new Promise((resolve, reject) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => resolve(position),
                    (error) => resolve(null),
                    {
                        enableHighAccuracy: true,
                    }
                );
            } else {
                alert('Geolocation is not supported by this browser.');
                return resolve(null);
            }
        });
    }

    const getCurrentLocation = async () => {
        if (!localLocation) {
            return '';
        }

        const locationName = await getLocationName(localLocation.coords.latitude, localLocation.coords.longitude);
        return locationName;
    }


    const formatDateTime = (date) => {
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        const day = days[date.getDay()];
        const month = months[date.getMonth()];
        const currentDate = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');

        return `${day} ${currentDate} ${month} ${date.getFullYear()} ${hours}:${minutes}:${seconds}`;
    }

    const openPermissionLoading = () => {
        Swal.fire({
            title: "Please wait",
            html: "requesting permission...",
            didOpen: () => {
                Swal.showLoading();
            },
        });
    }

    const doOpenCamera = (ev) => {
        btnOpenCamera.style.display = 'block';
        cameraOpened.style.display = 'none';

        return new Promise((resolve, reject) => {
            if (navigator.mediaDevices) {
                navigator.mediaDevices
                    .getUserMedia({ video: true, audio: false })
                    .then((stream) => {
                        localStream = stream;

                        cameraPreview.srcObject = stream;
                        cameraPreview.play();

                        btnOpenCamera.style.display = 'none';
                        cameraOpened.style.display = 'flex';

                        resolve(true);
                    })
                    .catch((err) => {
                        if (err.name === 'NotAllowedError') {
                            alert('Please allow camera access to use this app!');
                        }

                        console.error(`An error occurred: ${err}`);

                        resolve(false);
                    });
            } else {
                alert('Sorry, camera not available.');
                resolve(false);
            }
        });
    }

    const handleTakePhoto = async (ev) => {
        const context = cameraCanvas.getContext("2d");

        if (width && height) {
            cameraCanvas.width = width;
            cameraCanvas.height = height;

            context.drawImage(cameraPreview, 0, 0, width, height);

            context.textAlign = 'right';

            context.font = "14px Arial";
            context.fillStyle = "white";
            context.fillText(formatDateTime(new Date()), width - 10, height - 30);

            const location = await getCurrentLocation();

            context.font = "12px Arial";
            context.fillStyle = "white";
            context.fillText(location, width - 10, height - 15);

            const data = cameraCanvas.toDataURL("image/png");

            localImage = data;
            cameraResult.setAttribute("src", data);
        }
    }

    const handleVisibilityChange = async () => {
        if (document.visibilityState === 'hidden') {
            if (localStream) {
                cameraPreview.srcObject = null;
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
                btnOpenCamera.style.display = 'block';
                cameraOpened.style.display = 'none';
            }
        }
    }

    const handleDownloadPhoto = () => {
        if (localImage) {
            const link = document.createElement('a');
            link.href = localImage;
            link.download = `photo_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            return;
        } else {
            alert('Please take a photo first!');
        }
    }

    const handleRequestLocationPermission = async () => {
        btnRequestPermission.style.display = 'none';

        openPermissionLoading();

        const position = await getCurrentPosition();

        if (!position) {
            btnRequestPermission.style.display = 'block';
            alert('Please allow location access to use this app!');
            Swal.close();
            return;
        }

        localLocation = position;
        isLocationAllowed = true;

        btnRequestPermission.style.display = 'none';

        const camera = await doOpenCamera();

        Swal.close();
    }

    const handleOpenCamera = async () => {
        openPermissionLoading();

        const camera = await doOpenCamera();

        Swal.close();
    }

    btnTakePhoto.addEventListener('click', handleTakePhoto);
    btnDownloadPhoto.addEventListener('click', handleDownloadPhoto);
    btnRequestPermission.addEventListener('click', handleRequestLocationPermission);
    btnOpenCamera.addEventListener('click', handleOpenCamera);

    cameraPreview.addEventListener("canplay", (ev) => {
        if (!streaming) {
            height = cameraPreview.videoHeight / (cameraPreview.videoWidth / width);

            cameraPreview.setAttribute("width", width);
            cameraPreview.setAttribute("height", height);
            cameraCanvas.setAttribute("width", width);
            cameraCanvas.setAttribute("height", height);
            streaming = true;
        }
    });

    document.addEventListener('visibilitychange', () => handleVisibilityChange());

    handleRequestLocationPermission();
</script>

</html>
